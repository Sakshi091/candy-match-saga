<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍬 Candy Match Saga</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            color: white;
            text-align: center;
            touch-action: manipulation;
            overflow: hidden;
        }
        h1 { margin: 15px 0 5px; font-size: 28px; text-shadow: 0 3px 6px rgba(0,0,0,0.3); }
        .ui {
            display: flex; justify-content: space-around; align-items: center;
            margin: 10px auto; max-width: 420px;
            background: rgba(255,255,255,0.2); border-radius: 20px; padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat { font-size: 18px; font-weight: bold; }
        canvas {
            border: 8px solid #fff; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background: #1a1a2e; max-width: 100%; height: auto;
        }
        .controls { margin: 15px auto; max-width: 420px; }
        button {
            background: #ff6b6b; color: white; border: none;
            padding: 12px 24px; font-size: 18px; border-radius: 50px; margin: 0 8px;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4); cursor: pointer;
        }
        button:active { transform: scale(0.95); }
        .progress-container {
            width: 90%; max-width: 400px; margin: 10px auto;
            background: rgba(255,255,255,0.3); border-radius: 20px; height: 18px; overflow: hidden;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(to right, #ffd700, #ffeb3b);
            width: 0%; transition: width 0.6s ease; box-shadow: 0 0 15px #ffd700;
        }
        .win-modal, .lose-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #333; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5); z-index: 100; text-align: center; max-width: 320px;
        }
    </style>
</head>
<body>
    <h1>🍬 Candy Match Saga</h1>
    
    <div class="ui">
        <div class="stat">Score<br><span id="score">0</span></div>
        <div class="stat">Moves<br><span id="moves">20</span></div>
        <div class="stat">Level<br><span id="level">1</span></div>
    </div>

    <div class="progress-container">
        <div id="progress" class="progress-bar"></div>
    </div>

    <canvas id="canvas" width="400" height="400"></canvas>

    <div class="controls">
        <button onclick="restartGame()">Restart Level</button>
        <button onclick="pauseGame()">Pause</button>
    </div>

    <div id="winModal" class="win-modal">
        <h2>🎉 Level Complete!</h2>
        <p>Your score: <strong id="finalScore">0</strong></p>
        <button onclick="nextLevel()" style="background:#2ecc71;">Next Level →</button>
        <button onclick="restartGame()" style="background:#95a5a6;">Replay</button>
    </div>

    <div id="loseModal" class="lose-modal">
        <h2>😢 Out of Moves!</h2>
        <p>Final score: <strong id="loseScore">0</strong></p>
        <button onclick="restartGame()" style="background:#e74c3c;">Try Again</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 8;
        const CELL_SIZE = 50;

        const CANDY_EMOJIS = [
            '🍓', '🍊', '🍑', '🍏', '🍒', '🍇'
        ];
        
        let board = [];
        let score = 0;
        let movesLeft = 20;
        let targetScore = 1800;
        let currentLevel = 1;
        let selected = null;
        let isBusy = false;
        let animations = [];           // animation queue

        let lastTime = 0;

        // Sound
        let audioCtx;
        function playMatchSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(700 + Math.random()*400, audioCtx.currentTime);
            gain.gain.value = 0.25;
            osc.start();
            setTimeout(() => {
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.18);
                osc.stop(audioCtx.currentTime + 0.22);
            }, 60);
        }

        function initBoard() {
            do {
                board = Array.from({length: GRID_SIZE}, () => 
                    Array.from({length: GRID_SIZE}, () => Math.floor(Math.random() * CANDY_EMOJIS.length))
                );
            } while (findMatches().length > 0);
        }

        // ---------------- Animation Helpers ----------------
        function addAnimation(type, data, duration = 300) {
            animations.push({
                type,
                data,
                start: performance.now(),
                duration
            });
        }

        function easeOutQuad(t) { return t * (2 - t); }
        function easeInQuad(t) { return t * t; }

        // ---------------- Draw with animations ----------------
        function drawBoard(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 2;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(canvas.width, i * CELL_SIZE); ctx.stroke();
            }

            const now = performance.now();

            // Process & draw animations + static candies
            let stillAnimating = false;

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    let type = board[r][c];
                    if (type === null) continue;

                    let drawX = c * CELL_SIZE + CELL_SIZE / 2;
                    let drawY = r * CELL_SIZE + CELL_SIZE / 2;
                    let scale = 1;
                    let alpha = 1;
                    let glow = 0;

                    // Apply active animations to this cell
                    for (let i = animations.length - 1; i >= 0; i--) {
                        const anim = animations[i];
                        const progress = Math.min(1, (now - anim.start) / anim.duration);
                        const eased = easeOutQuad(progress);

                        if (anim.type === 'swap' && anim.data.fromR === r && anim.data.fromC === c) {
                            drawX += (anim.data.toC - c) * CELL_SIZE * eased;
                            drawY += (anim.data.toR - r) * CELL_SIZE * eased;
                            stillAnimating = true;
                        }
                        else if (anim.type === 'swap' && anim.data.toR === r && anim.data.toC === c) {
                            drawX += (anim.data.fromC - c) * CELL_SIZE * eased;
                            drawY += (anim.data.fromR - r) * CELL_SIZE * eased;
                            stillAnimating = true;
                        }
                        else if (anim.type === 'fall' && anim.data.r === r && anim.data.c === c) {
                            drawY += anim.data.distance * CELL_SIZE * eased;
                            stillAnimating = true;
                        }
                        else if (anim.type === 'disappear' && anim.data.has(`${r},${c}`)) {
                            scale = 1 - eased * 0.7;
                            alpha = 1 - eased;
                            stillAnimating = true;
                        }
                    }

                    // Selection pulse + glow
                    if (selected && selected.r === r && selected.c === c) {
                        const pulse = 0.9 + Math.sin(now / 160) * 0.12;
                        scale *= pulse;
                        glow = 12 + Math.sin(now / 220) * 6;
                    }

                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.translate(drawX, drawY);
                    ctx.scale(scale, scale);

                    // Glow ring when selected
                    if (glow > 0) {
                        ctx.shadowColor = 'rgba(255, 255, 180, 0.9)';
                        ctx.shadowBlur = glow;
                    }

                    ctx.font = '44px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;
                    ctx.fillText(CANDY_EMOJIS[type], 0, 0);

                    ctx.restore();
                }
            }

            // Particles (simple burst on disappear)
            for (let i = animations.length - 1; i >= 0; i--) {
                const anim = animations[i];
                if (anim.type === 'particles') {
                    const progress = Math.min(1, (now - anim.start) / anim.duration);
                    if (progress >= 1) {
                        animations.splice(i, 1);
                        continue;
                    }
                    stillAnimating = true;

                    anim.data.forEach(p => {
                        const x = p.x + p.vx * progress * 60;
                        const y = p.y + p.vy * progress * 60 + progress * progress * 200; // gravity-ish
                        ctx.globalAlpha = 1 - progress;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(x - 3, y - 3, 6, 6);
                    });
                }
            }

            // Clean finished animations
            animations = animations.filter(a => {
                const prog = (now - a.start) / a.duration;
                return prog < 1 || a.type === 'particles';
            });

            if (stillAnimating || animations.length > 0) {
                requestAnimationFrame(drawBoard);
            } else if (isBusy) {
                // Chain reaction check after animations finish
                processChain();
            }
        }

        function startAnimationLoop() {
            if (!lastTime) lastTime = performance.now();
            drawBoard(performance.now());
            requestAnimationFrame(startAnimationLoop);
        }

        // ---------------- Game Logic ----------------
        function getCell(x, y) {
            const col = Math.floor(x / CELL_SIZE);
            const row = Math.floor(y / CELL_SIZE);
            if (col >= 0 && col < GRID_SIZE && row >= 0 && row < GRID_SIZE) return {r: row, c: col};
            return null;
        }

        function areAdjacent(p1, p2) {
            return Math.abs(p1.r - p2.r) + Math.abs(p1.c - p2.c) === 1;
        }

        function swapPositions(p1, p2, animate = true) {
            const temp = board[p1.r][p1.c];
            board[p1.r][p1.c] = board[p2.r][p2.c];
            board[p2.r][p2.c] = temp;

            if (animate) {
                addAnimation('swap', {fromR: p1.r, fromC: p1.c, toR: p2.r, toC: p2.c}, 220);
                addAnimation('swap', {fromR: p2.r, fromC: p2.c, toR: p1.r, toC: p1.c}, 220);
            }
        }

        function findMatches() {
            const matched = new Set();

            // Horizontal
            for (let r = 0; r < GRID_SIZE; r++) {
                let c = 0;
                while (c < GRID_SIZE) {
                    const type = board[r][c];
                    if (type === null) {c++; continue;}
                    let start = c;
                    while (c < GRID_SIZE && board[r][c] === type) c++;
                    if (c - start >= 3) for (let i = start; i < c; i++) matched.add(`${r},${i}`);
                }
            }

            // Vertical
            for (let c = 0; c < GRID_SIZE; c++) {
                let r = 0;
                while (r < GRID_SIZE) {
                    const type = board[r][c];
                    if (type === null) {r++; continue;}
                    let start = r;
                    while (r < GRID_SIZE && board[r][c] === type) r++;
                    if (r - start >= 3) for (let i = start; i < r; i++) matched.add(`${i},${c}`);
                }
            }

            return matched;
        }

        function removeMatchesAndAnimate() {
            const matchedSet = findMatches();
            if (matchedSet.size === 0) return false;

            // Particles at centers of matched candies
            const particles = [];
            matchedSet.forEach(pos => {
                const [r, c] = pos.split(',').map(Number);
                const x = c * CELL_SIZE + CELL_SIZE / 2;
                const y = r * CELL_SIZE + CELL_SIZE / 2;
                board[r][c] = null;

                // Create 8-12 particles
                for (let i = 0; i < 10; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.2 + Math.random() * 1.8;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1.5, // slight upward bias
                        color: ['#ff6b6b','#ffd93d','#6bff6b','#6bd9ff','#d96bff'][Math.floor(Math.random()*5)]
                    });
                }
            });

            addAnimation('particles', particles, 600);
            addAnimation('disappear', matchedSet, 280);

            score += matchedSet.size * 65;
            playMatchSound();
            updateUI();

            return true;
        }

        function dropCandies() {
            for (let c = 0; c < GRID_SIZE; c++) {
                let writeRow = GRID_SIZE - 1;
                for (let r = GRID_SIZE - 1; r >= 0; r--) {
                    if (board[r][c] !== null) {
                        if (r !== writeRow) {
                            // Animate fall
                            const distance = writeRow - r;
                            addAnimation('fall', {r: writeRow, c, distance}, 300 + distance * 60);
                            board[writeRow][c] = board[r][c];
                        }
                        writeRow--;
                    }
                }
                for (let r = writeRow; r >= 0; r--) {
                    board[r][c] = null;
                }
            }
        }

        function fillTop() {
            for (let c = 0; c < GRID_SIZE; c++) {
                for (let r = 0; r < GRID_SIZE; r++) {
                    if (board[r][c] === null) {
                        board[r][c] = Math.floor(Math.random() * CANDY_EMOJIS.length);
                        // Fall from above
                        addAnimation('fall', {r, c, distance: - (Math.random() * 1.5 + 0.5)}, 400);
                    }
                }
            }
        }

        function processChain() {
            if (removeMatchesAndAnimate()) {
                isBusy = true;
                // Wait for disappear anim → drop → fill → check again
                setTimeout(() => {
                    dropCandies();
                    setTimeout(() => {
                        fillTop();
                        setTimeout(() => {
                            // Loop will continue via animation end check
                        }, 100);
                    }, 350);
                }, 350);
            } else {
                isBusy = false;
                checkGameState();
            }
        }

        function attemptSwap(p1, p2) {
            if (!areAdjacent(p1, p2)) return;

            swapPositions(p1, p2, true);

            const hasMatch = findMatches().size > 0;

            if (hasMatch) {
                movesLeft--;
                updateUI();
                isBusy = true;
                // processChain will be called after swap animation finishes
            } else {
                // Invalid → swap back with animation
                setTimeout(() => {
                    swapPositions(p1, p2, true);
                }, 250);
            }
        }

        function handlePointer(x, y) {
            if (isBusy) return;
            const pos = getCell(x, y);
            if (!pos) return;

            if (selected) {
                if (selected.r === pos.r && selected.c === pos.c) {
                    selected = null;
                } else if (areAdjacent(selected, pos)) {
                    attemptSwap(selected, pos);
                    selected = null;
                } else {
                    selected = pos;
                }
            } else {
                selected = pos;
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = movesLeft;
            const perc = Math.min(100, (score / targetScore) * 100 | 0);
            document.getElementById('progress').style.width = perc + '%';
        }

        function checkGameState() {
            if (score >= targetScore) {
                document.getElementById('finalScore').textContent = score;
                document.getElementById('winModal').style.display = 'block';
            } else if (movesLeft <= 0) {
                document.getElementById('loseScore').textContent = score;
                document.getElementById('loseModal').style.display = 'block';
            }
        }

        function restartGame() {
            document.getElementById('winModal').style.display = 'none';
            document.getElementById('loseModal').style.display = 'none';
            animations = [];
            score = 0;
            movesLeft = 20 + currentLevel * 2;
            targetScore = 1800 + currentLevel * 800;
            initBoard();
            selected = null;
            isBusy = false;
            updateUI();
        }

        function nextLevel() {
            document.getElementById('winModal').style.display = 'none';
            currentLevel++;
            document.getElementById('level').textContent = currentLevel;
            restartGame();
        }

        function pauseGame() {
            const cont = confirm(`Paused\nScore: ${score}\nMoves: ${movesLeft}\n\nContinue?`);
            if (!cont) restartGame();
        }

        // Events
        function setupEvents() {
            const handle = e => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                handlePointer(x, y);
            };

            canvas.addEventListener('mousedown', handle);
            canvas.addEventListener('touchstart', handle);
            canvas.addEventListener('touchmove', e => e.preventDefault());
        }

        // Start
        function startGame() {
            initBoard();
            updateUI();
            setupEvents();
            startAnimationLoop();
        }

        window.onload = startGame;
    </script>
</body>
</html>
